[project]
name = "fsb"
version = "11.0.2"
description = "File Services Backend - monorepo housing file services"
dependencies = [
    "typer >= 0.25",
    "ghga-service-commons[api, auth, crypt, transports] >= 7.0.1",
    "ghga-event-schemas >= 13.0.0",
    "hexkit[akafka, s3, mongodb, opentelemetry] >= 8.1",
    "crypt4gh >= 1.7",
    "hvac >= 2",
    "httpx >= 0.28",
]

[project.urls]
Repository = "https://github.com/ghga-de/file-services-backend"
