[project]
name = "fsb"
version = "10.0.0"
description = "File Services Backend - monorepo housing file services"
dependencies = [
    "typer >= 0.19",
    "ghga-service-commons[api, auth, crypt, transports] >= 7",
    "ghga-event-schemas >= 12.0.0",
    "hexkit[akafka, s3, mongodb, opentelemetry] >= 8.1",
    "crypt4gh >= 1.7",
    "hvac >= 2",
    "httpx >= 0.28",
]

[project.urls]
Repository = "https://github.com/ghga-de/file-services-backend"
