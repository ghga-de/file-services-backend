[project]
name = "fsb"
version = "16.0.0"
description = "File Services Backend - monorepo housing file services"
dependencies = [
    "typer >= 0.25",
    "ghga-service-commons[api, auth, crypt, transports] >= 7.1.0",
    "ghga-event-schemas >= 13.0.0",
    "hexkit[akafka, s3, mongodb, opentelemetry] >= 8.6.0",
    "crypt4gh >= 1.7",
    "hvac >= 2",
    "httpx >= 0.28",
    "packaging >= 26",
]

[project.urls]
Repository = "https://github.com/ghga-de/file-services-backend"
