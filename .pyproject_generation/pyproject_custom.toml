[project]
name = "fsb"
version = "1.0.0"
description = "File Services Backend - monorepo housing file services"
dependencies = [
    "typer >= 0.12",
    "ghga-service-commons[api, auth, crypt] >= 3.1",
    "ghga-event-schemas >= 4.0",
    "hexkit[akafka, s3, mongodb] >= 3.8",
    "crypt4gh>=1.6",
    "hvac>=2",
    "httpx>=0.27",
    "opentelemetry-api==1.29.0",
    "opentelemetry-sdk==1.29.0",
    "opentelemetry-exporter-otlp==1.29.0",
    "opentelemetry-distro==0.50b0",
    "opentelemetry-instrumentation==0.50b0",
    "opentelemetry-instrumentation-aiokafka==0.50b0",
    "opentelemetry-instrumentation-asyncio==0.50b0",
    "opentelemetry-instrumentation-botocore==0.50b0",
    "opentelemetry-instrumentation-click==0.50b0",
    "opentelemetry-instrumentation-fastapi==0.50b0",
    "opentelemetry-instrumentation-httpx==0.50b0",
    "opentelemetry-instrumentation-logging==0.50b0",
    "opentelemetry-instrumentation-pymongo==0.50b0",
    "opentelemetry-instrumentation-urllib3==0.50b0",
]

[project.urls]
Repository = "https://github.com/ghga-de/file-services-backend"
