components:
  schemas:
    BoxCreationRequest:
      description: Request body for creating a new FileUploadBox.
      properties:
        storage_alias:
          description: The storage alias to use for this upload box
          title: Storage Alias
          type: string
      required:
      - storage_alias
      title: Box Creation Request
      type: object
    BoxUpdateRequest:
      description: Request body for updating a FileUploadBox.
      properties:
        state:
          description: Updated state
          enum:
          - open
          - locked
          - archived
          title: State
          type: string
        version:
          description: The expected current version of the box (for optimistic locking)
          title: Version
          type: integer
      required:
      - state
      - version
      title: Box Update Request
      type: object
    FileUpload:
      description: 'A FileUpload.


        Contains all information required for a file''s journey from upload initiation
        to

        permanent archival.'
      properties:
        alias:
          description: The submitted alias from the metadata (unique within the box)
          title: Alias
          type: string
        box_id:
          description: The ID of the FileUploadBox this file is associated with
          format: uuid4
          title: Box Id
          type: string
        bucket_id:
          description: The name of the bucket where the file is currently stored
          title: Bucket Id
          type: string
        decrypted_sha256:
          anyOf:
          - type: string
          - type: 'null'
          description: SHA-256 checksum of the entire unencrypted file content
          title: Decrypted Sha256
        decrypted_size:
          description: The size of the unencrypted file
          title: Decrypted Size
          type: integer
        encrypted_parts_md5:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: The MD5 checksum for each file part, in sequence
          title: Encrypted Parts Md5
        encrypted_parts_sha256:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: The SHA256 checksum for each file part, in sequence
          title: Encrypted Parts Sha256
        encrypted_size:
          description: The size of the encrypted file content. When the file is in
            the inbox, this includes the Crypt4GH envelope. After re-encryption, the
            file no longer contains an envelope, so the value is slightly smaller.
          title: Encrypted Size
          type: integer
        failure_reason:
          anyOf:
          - type: string
          - type: 'null'
          description: The reason for upload or interrogation failure, if applicable.
          title: Failure Reason
        id:
          description: Unique identifier for the file upload
          format: uuid4
          title: Id
          type: string
        inbox_upload_completed:
          default: false
          description: Indicates whether the file has been completely uploaded to
            the inbox.
          title: Inbox Upload Completed
          type: boolean
        object_id:
          description: The ID of the file specific to its S3 bucket
          format: uuid4
          title: Object Id
          type: string
        part_size:
          description: The number of bytes in each file part (last part is likely
            smaller)
          title: Part Size
          type: integer
        secret_id:
          anyOf:
          - type: string
          - type: 'null'
          description: The internal ID of the Data Hub-generated decryption secret
          title: Secret Id
        state:
          default: init
          description: The state of the FileUpload
          enum:
          - init
          - inbox
          - failed
          - cancelled
          - interrogated
          - awaiting_archival
          - archived
          title: State
          type: string
        state_updated:
          description: Timestamp of when state was updated
          format: date-time
          title: State Updated
          type: string
        storage_alias:
          description: The storage alias of the Data Hub housing the file
          title: Storage Alias
          type: string
      required:
      - id
      - box_id
      - alias
      - state_updated
      - storage_alias
      - bucket_id
      - object_id
      - decrypted_size
      - encrypted_size
      - part_size
      title: FileUpload
      type: object
    FileUploadCompletionRequest:
      description: Request body for completing a FileUpload.
      properties:
        decrypted_sha256:
          description: The checksum of the unencrypted file
          title: Decrypted Sha256
          type: string
        encrypted_md5:
          description: The checksum of the encrypted file content, calculated from
            the list of MD5s for each part.
          title: Encrypted Md5
          type: string
        encrypted_parts_md5:
          description: The MD5 checksum for each encrypted file part, in sequence
          items:
            type: string
          title: Encrypted Parts Md5
          type: array
        encrypted_parts_sha256:
          description: The SHA-256 checksum for each encrypted file part, in sequence
          items:
            type: string
          title: Encrypted Parts Sha256
          type: array
      required:
      - decrypted_sha256
      - encrypted_md5
      - encrypted_parts_md5
      - encrypted_parts_sha256
      title: File Upload Completion Request
      type: object
    FileUploadCreationRequest:
      description: Request body for creating a new FileUpload.
      properties:
        alias:
          description: The alias for the file within the box (must be unique within
            the box)
          title: Alias
          type: string
        decrypted_size:
          description: The size of the unencrypted file in bytes
          minimum: 1.0
          title: Decrypted Size
          type: integer
        encrypted_size:
          description: The size of the encrypted file in bytes
          minimum: 1.0
          title: Encrypted Size
          type: integer
        part_size:
          description: The number of bytes in each file part (last part may be smaller)
          minimum: 1.0
          title: Part Size
          type: integer
      required:
      - alias
      - decrypted_size
      - encrypted_size
      - part_size
      title: File Upload Creation Request
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HttpBoxNotFoundError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpBoxNotFoundErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: boxNotFound
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpBoxNotFoundError
      type: object
    HttpBoxNotFoundErrorData:
      properties:
        box_id:
          format: uuid4
          title: Box Id
          type: string
      required:
      - box_id
      title: HttpBoxNotFoundErrorData
      type: object
    HttpBoxStateError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpBoxStateErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: boxStateError
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpBoxStateError
      type: object
    HttpBoxStateErrorData:
      properties:
        box_id:
          format: uuid4
          title: Box Id
          type: string
        box_state:
          title: Box State
          type: string
      required:
      - box_id
      - box_state
      title: HttpBoxStateErrorData
      type: object
    HttpBoxVersionError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpBoxVersionErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: boxVersionOutdated
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpBoxVersionError
      type: object
    HttpBoxVersionErrorData:
      properties:
        box_id:
          format: uuid4
          title: Box Id
          type: string
      required:
      - box_id
      title: HttpBoxVersionErrorData
      type: object
    HttpChecksumMismatchError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpChecksumMismatchErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: checksumMismatch
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpChecksumMismatchError
      type: object
    HttpChecksumMismatchErrorData:
      properties:
        file_id:
          format: uuid4
          title: File Id
          type: string
      required:
      - file_id
      title: HttpChecksumMismatchErrorData
      type: object
    HttpFileUploadNotFoundError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpFileUploadNotFoundErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: fileUploadNotFound
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpFileUploadNotFoundError
      type: object
    HttpFileUploadNotFoundErrorData:
      properties:
        file_id:
          format: uuid4
          title: File Id
          type: string
      required:
      - file_id
      title: HttpFileUploadNotFoundErrorData
      type: object
    HttpOrphanedMultipartUploadError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpOrphanedMultipartUploadErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: orphanedMultipartUpload
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpOrphanedMultipartUploadError
      type: object
    HttpOrphanedMultipartUploadErrorData:
      properties:
        file_alias:
          title: File Alias
          type: string
      required:
      - file_alias
      title: HttpOrphanedMultipartUploadErrorData
      type: object
    HttpS3UploadDetailsNotFoundError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpS3UploadDetailsNotFoundErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: s3UploadDetailsNotFound
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpS3UploadDetailsNotFoundError
      type: object
    HttpS3UploadDetailsNotFoundErrorData:
      properties:
        file_id:
          format: uuid4
          title: File Id
          type: string
      required:
      - file_id
      title: HttpS3UploadDetailsNotFoundErrorData
      type: object
    HttpS3UploadNotFoundError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpS3UploadNotFoundErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: s3UploadNotFound
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpS3UploadNotFoundError
      type: object
    HttpS3UploadNotFoundErrorData:
      additionalProperties: true
      properties: {}
      title: HttpS3UploadNotFoundErrorData
      type: object
    HttpUnknownStorageAliasError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpUnknownStorageAliasErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: noSuchStorage
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpUnknownStorageAliasError
      type: object
    HttpUnknownStorageAliasErrorData:
      additionalProperties: true
      properties: {}
      title: HttpUnknownStorageAliasErrorData
      type: object
    HttpUploadAbortError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpUploadAbortErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: uploadAbortError
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpUploadAbortError
      type: object
    HttpUploadAbortErrorData:
      additionalProperties: true
      properties: {}
      title: HttpUploadAbortErrorData
      type: object
    HttpUploadCompletionError:
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/HttpUploadCompletionErrorData'
        description:
          description: A human readable message to the client explaining the cause
            of the exception.
          title: Description
          type: string
        exception_id:
          const: uploadCompletionError
          title: Exception Id
          type: string
      required:
      - data
      - description
      - exception_id
      title: HttpUploadCompletionError
      type: object
    HttpUploadCompletionErrorData:
      properties:
        box_id:
          format: uuid4
          title: Box Id
          type: string
        file_id:
          format: uuid4
          title: File Id
          type: string
      required:
      - box_id
      - file_id
      title: HttpUploadCompletionErrorData
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    HTTPBearer:
      scheme: bearer
      type: http
info:
  description: A service managing uploads of file objects to an S3-compatible Object
    Storage.
  title: Upload Controller Service
  version: 11.0.0
openapi: 3.1.0
paths:
  /boxes:
    post:
      description: 'Create a new FileUploadBox.


        Requires CreateFileBoxWorkOrder token and only allowed for Data Stewards via
        the UOS.

        Request body should contain the storage alias to use for uploads within the
        box.

        Returns the box_id of the newly created FileUploadBox.'
      operationId: createBox
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoxCreationRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                format: uuid4
                title: Response Createbox
                type: string
          description: The box_id of the newly created FileUploadBox
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpUnknownStorageAliasError'
          description: 'Exceptions by ID:

            - noSuchStorage: The storage node for the given alias does not exist.'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create a new FileUploadBox
      tags:
      - UploadControllerService
  /boxes/{box_id}:
    patch:
      description: 'Update a FileUploadBox to lock it, unlock it, or archive it.


        Request body must contain a `state` field indicating the target state of the
        box,

        as well as a `version` field indicating the expected current version of the
        box.

        Requires ChangeFileBoxWorkOrder token from the UOS. Users are only allowed
        to lock

        the box; a Data Steward role is required to do everything else.'
      operationId: updateBox
      parameters:
      - in: path
        name: box_id
        required: true
        schema:
          format: uuid4
          title: Box Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoxUpdateRequest'
        required: true
      responses:
        '204':
          description: FileUploadBox successfully updated
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpBoxNotFoundError'
          description: 'Exceptions by ID:

            - boxNotFound: The FileUploadBox with the given ID does not exist.'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpBoxVersionError'
          description: 'Exceptions by ID:

            - boxVersionOutdated: The requested FileUploadBox version is outdated.'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update a FileUploadBox (lock/unlock/archive)
      tags:
      - UploadControllerService
  /boxes/{box_id}/uploads:
    get:
      description: 'Retrieve list of FileUploads for a FileUploadBox.


        Returns the list of FileUploads for completed uploads in the specified box.

        Requires ViewFileBoxWorkOrder token from the UOS.'
      operationId: getBoxUploads
      parameters:
      - in: path
        name: box_id
        required: true
        schema:
          format: uuid4
          title: Box Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/FileUpload'
                title: Response Getboxuploads
                type: array
          description: List of file IDs for completed uploads in the box
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpBoxNotFoundError'
          description: 'Exceptions by ID:

            - boxNotFound: The FileUploadBox with the given ID does not exist.'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Retrieve list of file IDs for box
      tags:
      - UploadControllerService
    post:
      description: 'Add a new FileUpload to an existing FileUploadBox.


        Creates a new file upload within the specified box with the provided alias,
        checksum, and size.

        Initiates a multipart upload and returns the file ID for the newly created
        upload.

        Requires a CreateFileWorkOrder token from the WPS.'
      operationId: createFileUpload
      parameters:
      - in: path
        name: box_id
        required: true
        schema:
          format: uuid4
          title: Box Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileUploadCreationRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                format: uuid4
                title: Response Createfileupload
                type: string
          description: The file_id of the newly created FileUpload
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpUnknownStorageAliasError'
          description: 'Exceptions by ID:

            - noSuchStorage: The storage node for the given alias does not exist.'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpBoxNotFoundError'
          description: 'Exceptions by ID:

            - boxNotFound: The FileUploadBox with the given ID does not exist.'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpOrphanedMultipartUploadError'
          description: 'Exceptions by ID:

            - orphanedMultipartUpload: A multipart upload is already in progress for
            this file but cannot be aborted. Request file deletion and then attempt
            the upload again.'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Add a new FileUpload to an existing FileUploadBox
      tags:
      - UploadControllerService
  /boxes/{box_id}/uploads/{file_id}:
    delete:
      description: 'Remove a FileUpload from the FileUploadBox.


        Deletes the FileUpload and tells S3 to cancel the multipart upload if applicable.

        Requires a DeleteFileWorkOrder token from the WPS.'
      operationId: removeFileUpload
      parameters:
      - in: path
        name: box_id
        required: true
        schema:
          format: uuid4
          title: Box Id
          type: string
      - in: path
        name: file_id
        required: true
        schema:
          format: uuid4
          title: File Id
          type: string
      responses:
        '204':
          description: FileUpload removed successfully
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpUnknownStorageAliasError'
          description: 'Exceptions by ID:

            - noSuchStorage: The storage node for the given alias does not exist.'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpS3UploadDetailsNotFoundError'
          description: 'Exceptions by ID:

            - s3UploadDetailsNotFound: S3 upload details for the file could not be
            found.'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpBoxStateError'
          description: 'Exceptions by ID:

            - boxStateError: The FileUploadBox''s state precludes the requested action.'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpUploadAbortError'
          description: 'Exceptions by ID:

            - uploadAbortError: There was an error aborting the s3 multipart upload.'
      security:
      - HTTPBearer: []
      summary: Remove a FileUpload from the FileUploadBox
      tags:
      - UploadControllerService
    patch:
      description: 'Complete file upload by instructing S3 to finalize the multipart
        upload.


        Concludes the file upload process in UCS by instructing S3 to complete the

        multipart upload for the specified file.

        Requires a CloseFileWorkOrder token from the WPS.'
      operationId: completeFileUpload
      parameters:
      - in: path
        name: box_id
        required: true
        schema:
          format: uuid4
          title: Box Id
          type: string
      - in: path
        name: file_id
        required: true
        schema:
          format: uuid4
          title: File Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileUploadCompletionRequest'
        required: true
      responses:
        '204':
          description: File upload completed successfully
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpChecksumMismatchError'
          description: 'Exceptions by ID:

            - checksumMismatch: The user-supplied encrypted checksum doesn''t match
            S3.'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpFileUploadNotFoundError'
          description: 'Exceptions by ID:

            - fileUploadNotFound: The FileUpload could not be found.'
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpBoxStateError'
          description: 'Exceptions by ID:

            - boxStateError: The FileUploadBox''s state precludes the requested action.'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpUploadCompletionError'
          description: 'Exceptions by ID:

            - s3UploadCompletionFailure: There was an error completing the s3 multipart
            upload. Delete the file from the file upload box and retry.'
      security:
      - HTTPBearer: []
      summary: Complete file upload
      tags:
      - UploadControllerService
  /boxes/{box_id}/uploads/{file_id}/parts/{part_no}:
    get:
      description: 'Get pre-signed S3 upload URL for a specific file part.


        Returns a pre-signed URL that can be used to upload the bytes for the specified

        part number of the specified file upload.

        Requires an UploadFileWorkOrder token from the WPS.'
      operationId: getPartUploadUrl
      parameters:
      - in: path
        name: box_id
        required: true
        schema:
          format: uuid4
          title: Box Id
          type: string
      - in: path
        name: file_id
        required: true
        schema:
          format: uuid4
          title: File Id
          type: string
      - in: path
        name: part_no
        required: true
        schema:
          title: Part No
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                title: Response Getpartuploadurl
                type: string
          description: The pre-signed URL for uploading the file part
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpUnknownStorageAliasError'
          description: 'Exceptions by ID:

            - noSuchStorage: The storage node for the given alias does not exist.'
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HttpS3UploadNotFoundError'
          description: 'Exceptions by ID:

            - s3UploadNotFound: The S3 multipart upload could not be found.'
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get pre-signed S3 upload URL for file part
      tags:
      - UploadControllerService
  /health:
    get:
      description: Used to test if this service is alive
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: health
      tags:
      - UploadControllerService
tags:
- name: UploadControllerService
